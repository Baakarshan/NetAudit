ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.netaudit.ApplicationKt.module ]
    }
}

database {
    host = "localhost"
    host = ${?DB_HOST}
    port = 5432
    port = ${?DB_PORT}
    name = "netaudit"
    name = ${?DB_NAME}
    user = "netaudit"
    user = ${?DB_USER}
    password = "netaudit123"
    password = ${?DB_PASSWORD}
}

capture {
    interface = "eth0"
    interface = ${?CAPTURE_INTERFACE}
    bufferSize = 65536
    timeout = 10
}
