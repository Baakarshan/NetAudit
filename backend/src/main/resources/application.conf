ktor {
    deployment {
        port = 8080
    }
    application {
        modules = [ com.netaudit.MainKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/netaudit"
    driver = "org.postgresql.Driver"
    user = "netaudit"
    password = "netaudit"
    maxPoolSize = 10
}

capture {
    interface = "eth0"        # 网卡名，可被环境变量覆盖
    promiscuous = true
    snapshotLength = 65536
    readTimeout = 100         # ms
    channelBufferSize = 4096
}

alert {
    enabled = true
}
